<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<body>

  <div th:fragment="notification"
       th:if="${notificacionTipo != null}"
       th:classappend="'notification--' + ${notificacionTipo}"
       class="notification"
       role="alert"
       aria-live="polite">

    <!-- Icono éxito -->
    <svg th:if="${notificacionTipo == 'success'}"
         class="notification__icon"
         xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
         stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
    </svg>

    <!-- Icono error -->
    <svg th:if="${notificacionTipo == 'error'}"
         class="notification__icon"
         xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
         stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
    </svg>

    <div class="notification__body">
      <p class="notification__title"
         th:text="${notificacionTipo == 'success'} ? 'Registro exitoso' : 'Ocurrió un error'">
        Título
      </p>
      <p class="notification__message" th:text="${notificacionMensaje}">Mensaje</p>
    </div>

  </div>

</body>
</html>

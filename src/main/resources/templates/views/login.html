<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layouts/base :: head('Inicio de sesión - VetSystem', ~{::link})}">
  <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body>
  <div class="login-wrapper">

    <div class="form-container">
      <div>
        <span class="logo">SysVet</span>
      </div>
      <form class="form">
        <label for="email">Email</label>
        <input class="form__input" type="email" id="email" name="email" placeholder="usuario@test.com" />

        <label for="password">Contraseña</label>
        <input class="form__input" type="password" id="password" name="password" placeholder="Contraseña" />

        <button type="submit" class="form__button">Iniciar sesión</button>
      </form>
    </div>
  </div>
</body>

</html>

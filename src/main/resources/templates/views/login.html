<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layouts/base :: head('Inicio de sesión - VetSystem', ~{::link})}">
  <link rel="stylesheet" th:href="@{/css/atomos.css}">
  <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body>
  <div class="login-wrapper">

    <div class="form-container">
      <div style="display: flex; align-items: center; justify-content: space-between;">
        <span class="logo">VetSystem</span>
        <a th:href="@{/}" class="back-link">← Volver</a>
      </div>
      <form class="form" th:action="@{/login}" method="post">
        <label for="email">Email</label>
        <input class="form__input" type="email" id="email" name="username" placeholder="usuario@test.com" />

        <label for="password">Contraseña</label>
        <input class="form__input" type="password" id="password" name="password" placeholder="Contraseña" />

        <button type="submit" class="form__button btn btn--primary">Iniciar sesión</button>
      </form>
    </div>
  </div>
</body>

</html>

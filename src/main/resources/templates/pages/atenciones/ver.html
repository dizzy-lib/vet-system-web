<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layouts/panel-layout :: head('Atención - VetSystem', ~{::link})}">
  <link rel="stylesheet" th:href="@{/css/atomos.css}">
  <link rel="stylesheet" th:href="@{/css/atenciones.css}">
</head>

<body>
  <div th:replace="~{components/notification :: notification}"></div>

  <div class="panel">
    <header th:replace="~{layouts/panel-layout :: header}"></header>

    <main class="main-content">
      <div class="atencion-detalle">

        <a th:href="@{/panel/atenciones}" class="atencion-back-link">← Volver a atenciones</a>
        <h1>Atención</h1>

        <div class="atencion-detalle__cita-card">
          <p class="atencion-detalle__cita-titulo">Datos de la cita</p>
          <dl class="atencion-detalle__cita-info">
            <div class="atencion-detalle__cita-fila">
              <dt>Paciente</dt>
              <dd th:text="${cita.mascotaNombre()}">Mascota</dd>
            </div>
            <div class="atencion-detalle__cita-fila">
              <dt>Fecha</dt>
              <dd th:text="${#temporals.format(cita.fecha(), 'dd/MM/yyyy')}">01/01/2025</dd>
            </div>
            <div class="atencion-detalle__cita-fila">
              <dt>Hora</dt>
              <dd th:text="${#temporals.format(cita.hora(), 'HH:mm')}">00:00</dd>
            </div>
            <div class="atencion-detalle__cita-fila">
              <dt>Veterinario</dt>
              <dd th:text="${cita.veterinarioNombre()}">Veterinario</dd>
            </div>
            <div class="atencion-detalle__cita-fila">
              <dt>Especialidad</dt>
              <dd th:text="${cita.especialidad()}">Especialidad</dd>
            </div>
          </dl>
        </div>

        <form class="atencion-detalle__form" method="post"
              th:action="@{/panel/atenciones/{index}/guardar(index=${index})}">

          <div class="atencion-campo">
            <label class="atencion-campo__label">Diagnóstico</label>
            <textarea th:if="${esVetDeLaCita}"
                      class="atencion-campo__textarea"
                      name="diagnostico"
                      rows="4"
                      th:text="${atencion?.diagnostico}"></textarea>
            <p th:unless="${esVetDeLaCita}"
               class="atencion-campo__valor"
               th:classappend="${atencion?.diagnostico == null ? ' atencion-campo__vacio' : ''}"
               th:text="${atencion?.diagnostico ?: 'Sin registrar'}">Sin registrar</p>
          </div>

          <div class="atencion-campo">
            <label class="atencion-campo__label">Tratamiento</label>
            <textarea th:if="${esVetDeLaCita}"
                      class="atencion-campo__textarea"
                      name="tratamiento"
                      rows="4"
                      th:text="${atencion?.tratamiento}"></textarea>
            <p th:unless="${esVetDeLaCita}"
               class="atencion-campo__valor"
               th:classappend="${atencion?.tratamiento == null ? ' atencion-campo__vacio' : ''}"
               th:text="${atencion?.tratamiento ?: 'Sin registrar'}">Sin registrar</p>
          </div>

          <div class="atencion-campo">
            <label class="atencion-campo__label">Medicamentos recetados</label>

            <div th:if="${esVetDeLaCita}" class="atencion-campo__medicamentos">
              <div th:each="med, medStat : ${medicamentos}" class="atencion-campo__medicamento-item">
                <input type="checkbox"
                       th:id="|med-${medStat.index}|"
                       name="medicamentosSeleccionados"
                       th:value="${med.nombre()}"
                       th:checked="${atencion?.medicamentosSeleccionados != null and #lists.contains(atencion.medicamentosSeleccionados(), med.nombre())}">
                <label th:for="|med-${medStat.index}|"
                       th:text="|${med.nombre()} — $ ${#numbers.formatInteger(med.precio(), 1, 'POINT')}|">Medicamento</label>
              </div>
            </div>

            <div th:unless="${esVetDeLaCita}">
              <p th:if="${atencion?.medicamentosSeleccionados == null or atencion.medicamentosSeleccionados().isEmpty()}"
                 class="atencion-campo__valor atencion-campo__vacio">Sin registrar</p>
              <ul th:if="${atencion?.medicamentosSeleccionados != null and !atencion.medicamentosSeleccionados().isEmpty()}"
                  class="atencion-campo__medicamentos-lista">
                <li th:each="med : ${atencion.medicamentosSeleccionados()}" th:text="${med}"></li>
              </ul>
            </div>
          </div>

          <div class="atencion-campo">
            <label class="atencion-campo__label">Notas médicas del paciente</label>
            <textarea th:if="${esVetDeLaCita}"
                      class="atencion-campo__textarea"
                      name="notasMedicas"
                      rows="4"
                      th:text="${atencion?.notasMedicas}"></textarea>
            <p th:unless="${esVetDeLaCita}"
               class="atencion-campo__valor"
               th:classappend="${atencion?.notasMedicas == null ? ' atencion-campo__vacio' : ''}"
               th:text="${atencion?.notasMedicas ?: 'Sin registrar'}">Sin registrar</p>
          </div>

          <div class="atencion-detalle__acciones">
            <button th:if="${esVetDeLaCita}" type="submit" class="btn btn--secondary">Guardar cambios</button>
            <a th:href="@{/panel/atenciones/{index}/factura(index=${index})}" class="btn btn--primary">Ver factura</a>
          </div>

        </form>

      </div>
    </main>
  </div>
</body>

</html>

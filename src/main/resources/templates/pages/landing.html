<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layouts/base :: head('Inicio - VetSystem', ~{:: #extra})}">
  <th:block id="extra">
    <link rel="stylesheet" th:href="@{/css/landing.css}">
  </th:block>
</head>

<body>
  <main class="landing">
    <h1 class="landing__title">VetSystem</h1>
    <p class="landing__subtitle">Sistema de gestión veterinaria</p>
    <div class="landing__actions">
      <a th:href="@{/login}" class="landing__link landing__link--primary" sec:authorize="!isAuthenticated()">Iniciar sesión</a>
      <a th:href="@{/panel}" class="landing__link landing__link--primary" sec:authorize="isAuthenticated()">Ir al panel</a>
    </div>
  </main>
</body>

</html>
